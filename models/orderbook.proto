syntax = "proto3";

package models;

option go_package = "./models";

message Orderbook {
  string symbol = 1;
  repeated MatchEngineEntry buy = 2;
  repeated MatchEngineEntry sell = 3;
  repeated Order ConditionalOrders = 4;
  uint64 seq = 5;
}

message MatchEngineEntry {
    string price = 1;
    repeated Order orders = 2;
}

message Order {
    int64 id = 1;
    string symbol = 2;
    string side = 3;
    string price = 4;
    string volume = 5;
    string type = 6;
    string trigger_price = 7;
    int64 user_id = 8;
    string time_in_force = 9;
    string stp = 10;
}
