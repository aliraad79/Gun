run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - copyloopvar
    - gocritic
    - misspell

linters-settings:
  gocritic:
    enabled-tags:
      - performance
    disabled-checks:
      - paramTypeCombine

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
